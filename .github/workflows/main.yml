name: terraform CI

on:
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - run: terraform version
      - run: ls -la

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate
      - run: terraform plan -input=false
